<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joel Stockman</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

header{
    padding:30px 40px;
}

h1{
    font-size:1rem;
    font-weight:400;
    letter-spacing:0.35em;
}

.video-wrapper{
    width:100%;
    padding:0;
}

video{
    width:100%;
    display:block;
    cursor:pointer;
}

.info{
    max-width:700px;
    padding:40px;
}

.about{
    color:#bdbdbd;
    line-height:1.8;
    margin-bottom:24px;
}

.contact a{
    color:#fff;
    text-decoration:none;
}

.contact a:hover{
    opacity:0.7;
}

@media (max-width:700px){

    header{
        padding:20px 16px;
    }

    .info{
        padding:24px 16px 60px;
    }

    h1{
        letter-spacing:0.25em;
    }

}

</style>

</head>

<body>

<header>
    <h1>JOEL STOCKMAN</h1>
</header>

<div class="video-wrapper">

```
<video id="showreel" autoplay muted loop playsinline>
    <source src="showreel.mp4" type="video/mp4">
</video>
```

</div>

<div class="info">

```
<div class="about">
    Filmmaker and videographer based in Sweden.
</div>

<div class="contact">
    <a href="mailto:hello@joelstockman.com">
        hello@joelstockman.com
    </a>
</div>
```

</div>

<script>

const video = document.getElementById("showreel");

video.addEventListener("click", () => {

    if(video.paused){
        video.play();
    } else {
        video.pause();
    }

});

</script>

</body>
</html>
