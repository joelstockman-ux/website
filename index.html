<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joel Stockman</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 60px 24px;
}

h1 {
    font-size: 1.2rem;
    font-weight: 400;
    letter-spacing: 0.35em;
    margin-bottom: 40px;
}

video {
    width: 100%;
    display: block;
    margin-bottom: 40px;
    background: #111;
}

.about {
    max-width: 650px;
    color: #bdbdbd;
    font-size: 1rem;
    line-height: 1.8;
    margin-bottom: 30px;
}

.contact a {
    color: #fff;
    text-decoration: none;
}

.contact a:hover {
    opacity: 0.7;
}

@media (max-width: 700px) {
    .container {
        padding: 30px 20px 60px;
    }

    h1 {
        font-size: 1rem;
        letter-spacing: 0.25em;
    }

    .about {
        font-size: 0.95rem;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>JOEL STOCKMAN</h1>

<video controls preload="metadata">
    <source src="showreel.mp4" type="video/mp4">
    Your browser does not support HTML5 video.
</video>

<div class="about">
    Joel Stockman is a filmmaker and videographer based in Sweden.
    Creating documentaries, commercial films and branded content with a focus on authentic storytelling.
</div>

<div class="contact">
    <a href="mailto:hello@joelstockman.com">
        hello@joelstockman.com
    </a>
</div>

</div>

</body>
</html>
