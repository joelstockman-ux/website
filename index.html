<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joel Stockman</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 24px 80px;
}

h1 {
    font-size: 1.2rem;
    font-weight: 400;
    letter-spacing: 0.35em;
    margin-bottom: 30px;
}

video {
    width: 100%;
    display: block;
    cursor: pointer;
    margin-bottom: 30px;
}

.about {
    max-width: 600px;
    color: #bdbdbd;
    font-size: 1rem;
    line-height: 1.8;
    margin-bottom: 25px;
}

.contact a {
    color: #fff;
    text-decoration: none;
}

.contact a:hover {
    opacity: 0.7;
}

@media (max-width: 700px) {
    .container {
        padding: 24px 16px 60px;
    }

    h1 {
        font-size: 1rem;
        letter-spacing: 0.25em;
    }

    .about {
        font-size: 0.95rem;
    }
}
</style>

</head>

<body>

<div class="container">

<h1>JOEL STOCKMAN</h1>

<video id="showreel" autoplay muted loop playsinline>
    <source src="showreel.mp4" type="video/mp4">
</video>

<div class="about">
    Filmmaker and videographer based in Sweden.
</div>

<div class="contact">
    <a href="mailto:hello@joelstockman.com">
        hello@joelstockman.com
    </a>
</div>

</div>

<script>
const video = document.getElementById("showreel");

video.addEventListener("click", () => {
    if (video.paused) {
        video.play();
    } else {
        video.pause();
    }
});
</script>

</body>
</html>
